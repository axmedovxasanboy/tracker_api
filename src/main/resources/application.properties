spring.application.name=tracker-project
server.port=${SERVER_PORT:8080}

# Database — values come from environment when set, fall back to local-dev defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tracker_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Card encryption — AES-GCM key for full card numbers. The cipher SHA-256-derives a 32-byte
# key from whatever string you set, so any value works. NEVER commit a real key: set
# APP_CARD_ENCRYPTION_KEY via the environment. The placeholder below only lets the app boot for
# local dev — using it in production leaves card numbers protected by a publicly-known key, and
# CHANGING the key makes any already-stored card numbers unreadable, so keep it stable per env.
app.card.encryption-key=${APP_CARD_ENCRYPTION_KEY:local-dev-only-change-me}

# Reveal endpoint rate limiting
app.card.reveal.max-attempts=${CARD_REVEAL_MAX_ATTEMPTS:5}
app.card.reveal.lockout-seconds=${CARD_REVEAL_LOCKOUT_SECONDS:300}

# Pagination cap
app.pagination.max-page-size=${APP_MAX_PAGE_SIZE:100}

# Auth (JWT) — SHA-256 derives a 256-bit HMAC key from this secret, so any value works.
# NEVER commit a real secret: set APP_JWT_SECRET via the environment. The placeholder below only
# lets the app boot for local dev (a publicly-known signing key is unsafe in production).
# Changing it invalidates all issued tokens, forcing re-login.
app.jwt.secret=${APP_JWT_SECRET:local-dev-only-change-me}
app.jwt.access-ttl-seconds=${APP_JWT_ACCESS_TTL:900}
app.jwt.refresh-ttl-seconds=${APP_JWT_REFRESH_TTL:604800}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
